<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 350" width="900" height="350">
  <defs>
    <!-- Outer ring: vivid green to cyan -->
    <linearGradient id="outerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22bb22"/>
      <stop offset="25%" stop-color="#44dd33"/>
      <stop offset="55%" stop-color="#00ddaa"/>
      <stop offset="80%" stop-color="#00ccee"/>
      <stop offset="100%" stop-color="#00ddff"/>
    </linearGradient>

    <!-- Inner ring: deep blue to bright cyan -->
    <linearGradient id="innerGrad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0022aa"/>
      <stop offset="30%" stop-color="#0044cc"/>
      <stop offset="60%" stop-color="#0077ee"/>
      <stop offset="100%" stop-color="#00ccff"/>
    </linearGradient>

    <!-- Text gradient: green to blue -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#44ee44"/>
      <stop offset="40%" stop-color="#00cc55"/>
      <stop offset="70%" stop-color="#00aacc"/>
      <stop offset="100%" stop-color="#00aaff"/>
    </linearGradient>

    <!-- Lens flare radial -->
    <radialGradient id="flare" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="10%" stop-color="#ffffee" stop-opacity="0.95"/>
      <stop offset="30%" stop-color="#ffee44" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#ffaa00" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#ff6600" stop-opacity="0"/>
    </radialGradient>

    <!-- Flare secondary -->
    <radialGradient id="flare2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.4"/>
      <stop offset="50%" stop-color="#88ddff" stop-opacity="0.1"/>
      <stop offset="100%" stop-color="#0066ff" stop-opacity="0"/>
    </radialGradient>

    <!-- Green glow -->
    <filter id="greenGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="g1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="g2"/>
      <feMerge>
        <feMergeNode in="g1"/>
        <feMergeNode in="g2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Blue glow -->
    <filter id="blueGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="5" result="b1"/>
      <feGaussianBlur in="SourceGraphic" stdDeviation="2" result="b2"/>
      <feMerge>
        <feMergeNode in="b1"/>
        <feMergeNode in="b2"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Flare bloom -->
    <filter id="flareBloom" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="8"/>
    </filter>

    <!-- Text shadow -->
    <filter id="textShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="5" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <!-- Subtitle shadow -->
    <filter id="subShadow" x="-5%" y="-5%" width="110%" height="120%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <!-- Ring drop shadow -->
    <filter id="ringShadow" x="-15%" y="-15%" width="130%" height="130%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Transparent background — nothing here -->

  <!-- OUTER RING — vibrant green-cyan, large and bold -->
  <circle cx="680" cy="165" r="130" fill="none" stroke="url(#outerGrad)" stroke-width="24" filter="url(#ringShadow)"/>
  <circle cx="680" cy="165" r="130" fill="none" stroke="url(#outerGrad)" stroke-width="24" filter="url(#greenGlow)" opacity="0.5"/>

  <!-- INNER RING — blue, INSIDE the outer, offset slightly down-left -->
  <circle cx="665" cy="180" r="80" fill="none" stroke="url(#innerGrad)" stroke-width="18" filter="url(#ringShadow)"/>
  <circle cx="665" cy="180" r="80" fill="none" stroke="url(#innerGrad)" stroke-width="18" filter="url(#blueGlow)" opacity="0.45"/>

  <!-- Scattered energy particles — green/gold/cyan near flare -->
  <circle cx="780" cy="60" r="2.8" fill="#77ff00" opacity="0.9"/>
  <circle cx="792" cy="72" r="2" fill="#aaff22" opacity="0.85"/>
  <circle cx="768" cy="48" r="1.5" fill="#ffcc00" opacity="0.9"/>
  <circle cx="802" cy="88" r="2.2" fill="#55ff33" opacity="0.7"/>
  <circle cx="785" cy="52" r="1.7" fill="#ffdd00" opacity="0.8"/>
  <circle cx="758" cy="40" r="1.2" fill="#88ff44" opacity="0.65"/>
  <circle cx="798" cy="65" r="2.5" fill="#33ff00" opacity="0.6"/>
  <circle cx="810" cy="100" r="1.4" fill="#aaff00" opacity="0.7"/>
  <circle cx="775" cy="38" r="2" fill="#ccff00" opacity="0.55"/>
  <circle cx="815" cy="80" r="1" fill="#ffee00" opacity="0.85"/>
  <circle cx="750" cy="35" r="1.8" fill="#00ff55" opacity="0.6"/>
  <circle cx="820" cy="110" r="1.5" fill="#22ffaa" opacity="0.5"/>
  <circle cx="782" cy="42" r="1.3" fill="#ffaa00" opacity="0.75"/>
  <circle cx="800" cy="55" r="2.1" fill="#66ff11" opacity="0.65"/>
  <circle cx="763" cy="32" r="0.9" fill="#ffffff" opacity="0.55"/>
  <circle cx="812" cy="70" r="1.6" fill="#44ffcc" opacity="0.5"/>
  <circle cx="770" cy="55" r="3" fill="#11ee44" opacity="0.4"/>
  <circle cx="795" cy="42" r="1.1" fill="#ffff33" opacity="0.7"/>
  <circle cx="825" cy="95" r="1.8" fill="#00ffaa" opacity="0.45"/>
  <circle cx="755" cy="55" r="2.3" fill="#88ee00" opacity="0.5"/>

  <!-- Main lens flare — top right -->
  <ellipse cx="790" cy="65" rx="45" ry="45" fill="url(#flare)" opacity="0.9"/>
  <ellipse cx="790" cy="65" rx="25" ry="25" fill="url(#flare)" opacity="0.5" filter="url(#flareBloom)"/>

  <!-- Flare star spikes — 8 pointed -->
  <line x1="738" y1="65" x2="842" y2="65" stroke="#ffffff" stroke-width="2.5" opacity="0.85" stroke-linecap="round"/>
  <line x1="790" y1="13" x2="790" y2="117" stroke="#ffffff" stroke-width="2" opacity="0.65" stroke-linecap="round"/>
  <line x1="755" y1="30" x2="825" y2="100" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>
  <line x1="755" y1="100" x2="825" y2="30" stroke="#ffffff" stroke-width="1.5" opacity="0.5" stroke-linecap="round"/>

  <!-- Flare hot core -->
  <circle cx="790" cy="65" r="6" fill="#ffffff" opacity="1"/>
  <circle cx="790" cy="65" r="12" fill="#ffffff" opacity="0.45" filter="url(#flareBloom)"/>

  <!-- Secondary subtle flare reflection -->
  <ellipse cx="565" cy="285" rx="10" ry="10" fill="url(#flare2)" opacity="0.3"/>
  <circle cx="580" cy="275" r="3.5" fill="#ffffff" opacity="0.12"/>

  <!-- Title: "OmniOpt" as ONE word -->
  <text x="45" y="200" font-family="'Helvetica Neue', 'Arial Black', Arial, sans-serif" font-size="95" font-weight="800" fill="url(#textGrad)" letter-spacing="-2" filter="url(#textShadow)">
    OmniOpt
  </text>

  <!-- Subtitle -->
  <text x="48" y="260" font-family="'Helvetica Neue', Arial, sans-serif" font-size="30" font-weight="300" fill="#55ccff" letter-spacing="1.5" opacity="0.9" filter="url(#subShadow)">
    Hyperparameter Optimizer
  </text>
</svg>
